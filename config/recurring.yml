# examples:
#   periodic_cleanup:
#     class: CleanSoftDeletedRecordsJob
#     queue: background
#     args: [ 1000, { batch_size: 500 } ]
#     schedule: every hour
#   periodic_cleanup_with_command:
#     command: "SoftDeletedRecord.due.delete_all"
#     priority: 2
#     schedule: at 5am every day

production:
  clear_solid_queue_finished_jobs:
    command: "SolidQueue::Job.clear_finished_in_batches(sleep_between_batches: 0.3)"
    schedule: every hour at minute 12

  # Rotate the daily quiz. Fires at 23:05 UTC, which is just after midnight in
  # Europe/Paris year-round (CET = UTC+1, CEST = UTC+2). The job recomputes the
  # date in Europe/Paris and is idempotent per CET day, so the exact firing
  # minute only needs to land on the correct CET calendar day.
  rotate_daily_quiz:
    class: DailyRotationJob
    schedule: every day at 11:05pm
